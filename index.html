<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT NEXUS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-card: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.9);
            --accent-pink: #ff2d95;
            --accent-hover: #ff4da6;
            --text-dark: #2d1b3a;
            --text-gray: #6b5a7e;
            --success: #34c759;
            --danger: #ff3b30;
            --card-radius: 28px;
            --btn-radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', -apple-system, sans-serif;
            min-height: 100vh;
            color: var(--text-dark);
            background: linear-gradient(-45deg, #ffb6ff, #ffc6ff, #f0c6ff, #e0b6ff, #d8b4ff);
            background-size: 400% 400%;
            animation: auroraBG 18s ease infinite;
            background-attachment: fixed;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        @keyframes auroraBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .status-container {
            position: fixed; top: 25px; right: 25px;
            display: flex; flex-direction: column; gap: 10px; z-index: 1000;
        }
        .status-badge {
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); 
            color: var(--text-gray);
            padding: 9px 22px; 
            border-radius: 30px; 
            font-size: 13px; 
            font-weight: 600;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 4px 20px rgba(255, 45, 149, 0.15);
        }

        .container {
            width: 100%; max-width: 1180px;
            background: var(--glass-bg);
            backdrop-filter: blur(28px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 45px 50px;
            box-shadow: 0 15px 40px rgba(255, 45, 149, 0.12);
        }

        h1 {
            font-size: 3.2em;
            font-weight: 800;
            letter-spacing: -2px;
            text-align: center;
            margin-bottom: 40px;
            background: linear-gradient(90deg, #ff2d95, #c026d3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 1.25em;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section {
            background: var(--glass-card);
            border: 1px solid rgba(255,255,255,0.9);
            border-radius: var(--card-radius);
            padding: 32px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(255, 45, 149, 0.08);
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 25px; }

        /* Widget Card - Pink Theme */
        .widget-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid #fff;
            padding: 28px 24px;
            border-radius: 26px;
            box-shadow: 0 12px 35px rgba(255, 45, 149, 0.12);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .widget-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 50px rgba(255, 45, 149, 0.22);
        }

        .widget-title {
            font-size: 1.15em;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .widget-value {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #ff2d95, #c026d3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Switch */
        .switch { position: relative; display: inline-block; width: 68px; height: 38px; margin: 12px 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #e0d4ff;
            transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 30px; width: 30px;
            left: 4px; bottom: 4px; background-color: white;
            transition: .4s; border-radius: 50%; box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }
        input:checked + .slider { background: linear-gradient(90deg, #ff2d95, #c026d3); }
        input:checked + .slider:before { transform: translateX(30px); }

        /* Range Slider */
        input[type=range] {
            -webkit-appearance: none; width: 100%; height: 10px;
            background: #f0e0ff; border-radius: 10px;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 28px; width: 28px; border-radius: 50%;
            background: white;
            cursor: pointer;
            border: 3px solid var(--accent-pink);
            box-shadow: 0 4px 12px rgba(255, 45, 149, 0.3);
        }

        .chart-container { height: 130px; margin-top: 15px; }

        /* Terminal */
        .terminal-section {
            background: rgba(45, 27, 58, 0.85);
            backdrop-filter: blur(20px);
            border-radius: var(--card-radius);
            padding: 28px;
            margin-top: 40px;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .log-panel {
            height: 220px; overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13.5px;
            color: #d1c4e9;
            background: rgba(0,0,0,0.35);
            border-radius: 16px;
            padding: 18px;
        }

        button {
            background: var(--accent-pink);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: var(--btn-radius);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        button:hover {
            background: var(--accent-hover);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 45, 149, 0.3);
        }

        @media (max-width: 768px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            h1 { font-size: 2.4em; }
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="status-badge" id="status-bt"><i class="fab fa-bluetooth-b"></i> BT Offline</div>
        <div class="status-badge" id="status-fb"><i class="fas fa-cloud"></i> DB Offline</div>
    </div>

    <div class="container">
        <h1>IoT NEXUS</h1>

        <div class="grid-2">
            <!-- Cloud Sync -->
            <div class="section">
                <h2><i class="fas fa-cloud"></i> Cloud Sync</h2>
                <div style="display: grid; grid-template-columns: 1fr; gap: 12px;">
                    <div><label>API Key</label><input type="password" id="fb-apiKey" placeholder="AIzaSy..."></div>
                    <div><label>Database URL</label><input type="text" id="fb-dbUrl" placeholder="https://..."></div>
                    <div><label>Node Path</label><input type="text" id="fb-path" placeholder="iot/kelas8" value="iot/kelas8"></div>
                </div>
                <button class="btn-blue" id="btn-connect-fb" style="width:100%; margin-top: 15px; background:var(--accent-pink);">
                    <i class="fas fa-link"></i> Hubungkan Firebase
                </button>
            </div>

            <!-- Hardware Link -->
            <div class="section">
                <h2><i class="fas fa-microchip"></i> Hardware Link</h2>
                <p style="margin-bottom: 20px; font-size: 0.92em; color: var(--text-gray);">
                    Pastikan Micro:bit menyala dan ekstensi Bluetooth UART aktif.
                </p>
                <div style="display: flex; gap: 12px; flex-direction: column;">
                    <button id="btn-connect-ble" style="background:var(--accent-pink);">
                        <i class="fab fa-bluetooth"></i> Connect Micro:bit
                    </button>
                    <button id="btn-disconnect-ble" disabled>
                        <i class="fas fa-times"></i> Disconnect
                    </button>
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard-area" style="display: none; margin-top: 30px;">
            <h2 style="margin-bottom: 25px;"><i class="fas fa-chart-area"></i> Telemetry Sensors</h2>
            <div id="sensorGrid" class="grid-3" style="margin-bottom: 40px;"></div>

            <div class="grid-2">
                <div>
                    <h2 style="margin-bottom: 20px;"><i class="fas fa-toggle-on"></i> Lampu & Switch</h2>
                    <div id="switchGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 22px;"></div>
                </div>
                <div>
                    <h2 style="margin-bottom: 20px;"><i class="fas fa-sliders-h"></i> Dimmers</h2>
                    <div id="dimmerGrid" style="display: flex; flex-direction: column; gap: 25px;"></div>
                </div>
            </div>
        </div>

        <!-- Terminal -->
        <div class="terminal-section">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; color:#fff;">
                <h2 style="color:#fff; margin:0;"><i class="fas fa-terminal"></i> System Terminal</h2>
                <button id="btnClearLog" style="background:rgba(255,255,255,0.15); padding:8px 16px; font-size:0.85em;">
                    <i class="fas fa-trash"></i> Clear
                </button>
            </div>
            <div id="terminalLog" class="log-panel"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp, getApps, deleteApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
        import { getDatabase, ref, onValue, update, remove, set } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

        const state = {
            db: null, currentPath: "", unsubscribe: null, currentData: {}, historyData: {},
            device: null, txChar: null, rxChar: null, bleConnected: false, bleBuffer: "",
            charts: {}
        };

        const MAX_CHART_POINTS = 20;
        const $ = (id) => document.getElementById(id);

        const formatName = (str) => str.replace(/_/g, ' ').toUpperCase();

        function logMsg(msg, color = "#d1c4e9") {
            const time = new Date().toLocaleTimeString('id-ID', { hour12: false });
            const html = `<div class="log-line" style="margin-bottom:8px;"><span style="color:#a78bfa;">[${time}]</span> <span style="color:${color}">${msg}</span></div>`;
            $('terminalLog').insertAdjacentHTML('afterbegin', html);
        }

        function updateStatusUI() {
            $('btn-connect-ble').disabled = state.bleConnected;
            $('btn-disconnect-ble').disabled = !state.bleConnected;
            const b = $('status-bt');
            if(state.bleConnected) {
                b.innerHTML = '<i class="fab fa-bluetooth-b"></i> BT Connected';
                b.style.color = 'var(--success)';
            } else {
                b.innerHTML = '<i class="fab fa-bluetooth-b"></i> BT Offline';
                b.style.color = 'var(--text-gray)';
            }
        }

        function updateDBStatusUI(connected) {
            const b = $('status-fb');
            if(connected) {
                b.innerHTML = '<i class="fas fa-cloud"></i> DB Synced';
                b.style.color = 'var(--success)';
            } else {
                b.innerHTML = '<i class="fas fa-cloud"></i> DB Offline';
                b.style.color = 'var(--text-gray)';
            }
        }

        // Bluetooth
        const UART_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const UART_TX_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
        const UART_RX_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

        async function connectBLE() {
            try {
                if (!navigator.bluetooth) throw new Error("Browser tidak mendukung Web Bluetooth.");
                logMsg("Scanning BLE devices...", "#ff9edb");

                state.device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: "BBC micro:bit" }],
                    optionalServices: [UART_SERVICE_UUID]
                });

                state.device.addEventListener("gattserverdisconnected", () => {
                    state.bleConnected = false;
                    updateStatusUI();
                    logMsg("BLE Terputus!", "var(--danger)");
                });

                const server = await state.device.gatt.connect();
                const service = await server.getPrimaryService(UART_SERVICE_UUID);

                state.txChar = await service.getCharacteristic(UART_TX_UUID);
                state.rxChar = await service.getCharacteristic(UART_RX_UUID);

                await state.txChar.startNotifications();
                state.txChar.addEventListener("characteristicvaluechanged", handleBLEData);

                state.bleConnected = true;
                updateStatusUI();
                logMsg(`Terhubung ke ${state.device.name} ✨`, "#ff2d95");
            } catch (e) {
                logMsg(`BLE Error: ${e.message}`, "var(--danger)");
            }
        }

        function handleBLEData(event) {
            let arr = [];
            for (let i = 0; i < event.target.value.byteLength; i++) arr.push(event.target.value.getUint8(i));
            state.bleBuffer += String.fromCharCode.apply(null, arr);

            const lines = state.bleBuffer.split('\n');
            state.bleBuffer = lines.pop();

            lines.forEach(line => {
                const txt = line.trim();
                if (txt) processIncomingSensor(txt);
            });
        }

        function processIncomingSensor(txt) {
            logMsg(`RX < ${txt}`, "#ff9edb");
            if (!state.db) return;

            if (txt.includes(':')) {
                const parts = txt.split(':');
                let key = parts[0].trim().replace(/\s+/g, '_').toLowerCase();
                const val = parseFloat(parts[1].trim());

                let autoType = "sensor";

                // === MODIFIKASI AUTO TYPE ===
                if (key === "lampu" || key === "lampu2" || key === "lampu3" || key === "otomatis") {
                    autoType = "switch";
                }
                // Tambahkan lagi jika ada key lain yang ingin jadi switch

                if (!isNaN(val)) {
                    if (state.currentData[key]) {
                        update(ref(state.db, `${state.currentPath}/${key}`), { value: val });
                    } else {
                        logMsg(`Auto-creating ${autoType}: ${key}`, "#ff9edb");
                        set(ref(state.db, `${state.currentPath}/${key}`), {
                            tipe: autoType,
                            value: val,
                            satuan: "",
                            batas_atas: autoType === "dimmer" ? 1024 : 100
                        });
                    }
                }
            }
        }

        async function sendToMicrobit(key, val) {
            if (!state.rxChar) return logMsg("Kirim gagal: BLE belum konek", "var(--danger)");
            const payload = `${key}:${val}\n`;
            try {
                await state.rxChar.writeValue(new TextEncoder().encode(payload));
                logMsg(`TX > ${payload.trim()}`, "#ff9edb");
            } catch(e) {
                logMsg(`TX Error: ${e.message}`, "var(--danger)");
            }
        }

        // Firebase
        async function connectFirebase() {
            const apiKey = $('fb-apiKey').value.trim();
            const dbUrl = $('fb-dbUrl').value.trim();
            const path = $('fb-path').value.trim();

            if(!apiKey || !dbUrl || !path) return alert("Lengkapi config Firebase!");

            try {
                const config = { apiKey, databaseURL: dbUrl, projectId: dbUrl.split('//')[1]?.split('.')[0] };
                const apps = getApps();
                if (apps.length > 0) await deleteApp(apps[0]);
                if (state.unsubscribe) state.unsubscribe();

                const app = initializeApp(config);
                state.db = getDatabase(app);
                state.currentPath = path;

                state.unsubscribe = onValue(ref(state.db, path), (snapshot) => {
                    state.currentData = snapshot.val() || {};
                    renderDashboard(state.currentData);
                    updateDBStatusUI(true);
                });

                localStorage.setItem('iot_nexus_cfg', JSON.stringify({apiKey, dbUrl, path}));
                logMsg("Firebase terhubung berhasil 💖", "#ff2d95");
            } catch(e) {
                logMsg(`DB Error: ${e.message}`, "var(--danger)");
                updateDBStatusUI(false);
            }
        }

        // Render Dashboard
        function renderDashboard(data) {
            const keys = Object.keys(data);
            if(keys.length > 0) $('dashboard-area').style.display = 'block';

            const sensors = keys.filter(k => data[k].tipe === 'sensor');
            const switches = keys.filter(k => data[k].tipe === 'switch');
            const dimmers = keys.filter(k => data[k].tipe === 'dimmer');

            renderSensors(sensors, data);
            renderSwitches(switches, data);
            renderDimmers(dimmers, data);
        }

        // (Bagian renderSensors, renderSwitches, renderDimmers tetap sama seperti sebelumnya, hanya sedikit penyesuaian warna)
        // Saya persingkat di sini supaya tidak terlalu panjang. Kalau kamu mau saya kasih full code bagian render-nya juga, bilang ya.

        // Event Listeners
        $('btn-connect-ble').onclick = connectBLE;
        $('btn-disconnect-ble').onclick = () => { if(state.device) state.device.gatt.disconnect(); };
        $('btn-connect-fb').onclick = connectFirebase;
        $('btnClearLog').onclick = () => $('terminalLog').innerHTML = '';

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('iot_nexus_cfg') || '{}');
            if(saved.apiKey) {
                $('fb-apiKey').value = saved.apiKey;
                $('fb-dbUrl').value = saved.dbUrl;
                $('fb-path').value = saved.path || "iot/kelas8";
            }
            logMsg("Smart home siap digunakan 💕", "#c026d3");
        };
    </script>
</body>
</html>
