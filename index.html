<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartHome</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');
        
        :root {
            --accent-pink: #ff2d95;
            --accent-hover: #ff4da6;
            --text-dark: #2d1b3a;
            --text-gray: #6b5a7e;
            --success: #34c759;
            --glass-bg: rgba(255, 240, 255, 0.68);
            --glass-card: rgba(255, 255, 255, 0.88);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ffe0f0, #f8d7ff, #e0d4ff, #ffd1e6);
            background-size: 400% 400%;
            animation: auroraBG 22s ease infinite;
            color: var(--text-dark);
            padding: 30px 20px;
        }

        @keyframes auroraBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 1180px;
            margin: 0 auto;
            background: var(--glass-bg);
            backdrop-filter: blur(32px);
            border-radius: 34px;
            border: 1px solid rgba(255,255,255,0.95);
            box-shadow: 0 25px 60px rgba(255, 45, 149, 0.18);
            padding: 50px 45px;
        }

        h1 {
            font-size: 3.5em;
            font-weight: 800;
            text-align: center;
            margin-bottom: 45px;
            background: linear-gradient(90deg, #ff2d95, #c026d3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-container {
            position: fixed; top: 25px; right: 25px; z-index: 1000;
            display: flex; flex-direction: column; gap: 12px;
        }

        .status-badge {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 13.8px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 20px rgba(255, 45, 149, 0.2);
        }

        .section {
            background: var(--glass-card);
            border-radius: 28px;
            padding: 34px;
            margin-bottom: 32px;
            border: 1px solid rgba(255,255,255,0.95);
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 26px; }

        label { display: block; font-weight: 600; font-size: 0.87em; color: #8b5a9e; margin-bottom: 9px; }
        input {
            width: 100%; padding: 16px 22px; border: 2px solid #f8d7ff;
            border-radius: 18px; font-size: 1.02em; background: white;
        }
        input:focus { border-color: var(--accent-pink); box-shadow: 0 0 0 5px rgba(255, 45, 149, 0.18); }

        button {
            background: var(--accent-pink); color: white; border: none;
            padding: 16px 30px; border-radius: 18px; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover { background: var(--accent-hover); transform: translateY(-3px); }

        .widget-card {
            background: rgba(255,255,255,0.95);
            border-radius: 26px;
            padding: 28px;
            box-shadow: 0 15px 45px rgba(255, 45, 149, 0.15);
            transition: all 0.4s ease;
        }
        .widget-card:hover { transform: translateY(-8px); }

        .widget-title { font-size: 1.22em; font-weight: 700; color: #4a2c5a; margin-bottom: 14px; }
        .widget-value {
            font-size: 54px; font-weight: 800;
            background: linear-gradient(90deg, #ff2d95, #c026d3);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Switch Pink */
        .switch { position: relative; display: inline-block; width: 74px; height: 39px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background: #e0c8ff; transition: .4s; border-radius: 40px;
        }
        .slider:before {
            position: absolute; content: ""; height: 33px; width: 33px;
            left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background: linear-gradient(90deg, #ff2d95, #c026d3); }
        input:checked + .slider:before { transform: translateX(35px); }

        .terminal-section {
            background: rgba(45, 27, 58, 0.9);
            border-radius: 28px;
            padding: 32px;
            margin-top: 40px;
        }
        .log-panel {
            height: 240px; overflow-y: auto;
            font-family: monospace; background: rgba(0,0,0,0.45);
            border-radius: 18px; padding: 20px; color: #e0d4ff; font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="status-badge" id="status-bt"><i class="fab fa-bluetooth-b"></i> BT Offline</div>
        <div class="status-badge" id="status-fb"><i class="fas fa-cloud"></i> DB Offline</div>
    </div>

    <div class="container">
        <h1>SmartHome</h1>

        <div class="grid-2">
            <div class="section">
                <h2><i class="fas fa-cloud" style="color:#ff2d95"></i> Cloud Sync</h2>
                <div style="display: grid; grid-template-columns: 1fr; gap: 18px;">
                    <div><label>Firebase API Key</label><input type="password" id="fb-apiKey" placeholder="AIzaSy..."></div>
                    <div><label>Database URL</label><input type="text" id="fb-dbUrl" placeholder="https://..."></div>
                    <div><label>Node Path</label><input type="text" id="fb-path" value="iot/kelas8"></div>
                </div>
                <button id="btn-connect-fb" style="width:100%; margin-top: 22px;">
                    <i class="fas fa-link"></i> Hubungkan Firebase
                </button>
            </div>

            <div class="section">
                <h2><i class="fas fa-microchip" style="color:#ff2d95"></i> Hardware Link</h2>
                <p style="margin:20px 0 25px; color:var(--text-gray);">Pastikan Micro:bit menyala dan ekstensi Bluetooth UART aktif di MakeCode.</p>
                <button id="btn-connect-ble" style="width:100%; margin-bottom:12px;">
                    <i class="fab fa-bluetooth"></i> Connect Micro:bit
                </button>
                <button id="btn-disconnect-ble" disabled style="width:100%;">
                    <i class="fas fa-times"></i> Disconnect
                </button>
            </div>
        </div>

        <div id="dashboard-area" style="display:none; margin-top:40px;">
            <h2 style="margin-bottom:25px;"><i class="fas fa-chart-area"></i> Telemetry Sensors</h2>
            <div id="sensorGrid" class="grid-3"></div>

            <div class="grid-2" style="margin-top:45px;">
                <div>
                    <h2 style="margin-bottom:22px;"><i class="fas fa-toggle-on"></i> Lampu & Switch</h2>
                    <div id="switchGrid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:24px;"></div>
                </div>
                <div>
                    <h2 style="margin-bottom:22px;"><i class="fas fa-sliders-h"></i> Dimmers / Lainnya</h2>
                    <div id="dimmerGrid" style="display:flex; flex-direction:column; gap:28px;"></div>
                </div>
            </div>
        </div>

        <div class="terminal-section">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;color:white;">
                <h2 style="margin:0;color:white;"><i class="fas fa-terminal"></i> System Terminal</h2>
                <button id="btnClearLog" style="background:rgba(255,255,255,0.2);padding:9px 18px;">Clear Log</button>
            </div>
            <div id="terminalLog" class="log-panel"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp, getApps, deleteApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
        import { getDatabase, ref, onValue, update, set } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

        const state = {
            db: null, currentPath: "", unsubscribe: null, currentData: {}, historyData: {},
            device: null, txChar: null, rxChar: null, bleConnected: false, bleBuffer: "",
            charts: {}
        };

        const MAX_CHART_POINTS = 20;
        const $ = id => document.getElementById(id);
        const formatName = str => str.replace(/_/g, ' ').toUpperCase();

        function logMsg(msg, color = "#e0d4ff") {
            const time = new Date().toLocaleTimeString('id-ID', { hour12: false });
            $('terminalLog').insertAdjacentHTML('afterbegin', 
                `<div style="margin-bottom:7px;"><span style="color:#c4b5fd;">[${time}]</span> <span style="color:${color}">${msg}</span></div>`
            );
        }

        function updateStatusUI() {
            $('btn-connect-ble').disabled = state.bleConnected;
            $('btn-disconnect-ble').disabled = !state.bleConnected;
            const bt = $('status-bt');
            if (state.bleConnected) {
                bt.innerHTML = '<i class="fab fa-bluetooth-b"></i> BT Connected';
                bt.style.color = 'var(--success)';
            } else {
                bt.innerHTML = '<i class="fab fa-bluetooth-b"></i> BT Offline';
                bt.style.color = '#888';
            }
        }

        function updateDBStatusUI(connected) {
            const fb = $('status-fb');
            if (connected) {
                fb.innerHTML = '<i class="fas fa-cloud"></i> DB Synced';
                fb.style.color = 'var(--success)';
            } else {
                fb.innerHTML = '<i class="fas fa-cloud"></i> DB Offline';
                fb.style.color = '#888';
            }
        }

        // Bluetooth (dari kode original yang berhasil)
        const UART_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const UART_TX_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
        const UART_RX_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

        async function connectBLE() {
            try {
                if (!navigator.bluetooth) throw new Error("Browser tidak mendukung Web Bluetooth.");
                logMsg("Scanning BLE devices...", "#ff9edb");

                state.device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: "BBC micro:bit" }],
                    optionalServices: [UART_SERVICE_UUID]
                });

                state.device.addEventListener("gattserverdisconnected", () => {
                    state.bleConnected = false;
                    updateStatusUI();
                    logMsg("BLE Terputus!", "#ff6b9d");
                });

                const server = await state.device.gatt.connect();
                const service = await server.getPrimaryService(UART_SERVICE_UUID);

                state.txChar = await service.getCharacteristic(UART_TX_UUID);
                state.rxChar = await service.getCharacteristic(UART_RX_UUID);

                await state.txChar.startNotifications();
                state.txChar.addEventListener("characteristicvaluechanged", handleBLEData);

                state.bleConnected = true;
                updateStatusUI();
                logMsg(`Terhubung ke ${state.device.name} 💖`, "#ff2d95");
            } catch (e) {
                logMsg(`BLE Error: ${e.message}`, "#ff6b9d");
            }
        }

        function handleBLEData(event) {
            let arr = [];
            for (let i = 0; i < event.target.value.byteLength; i++) arr.push(event.target.value.getUint8(i));
            state.bleBuffer += String.fromCharCode.apply(null, arr);

            const lines = state.bleBuffer.split('\n');
            state.bleBuffer = lines.pop() || "";

            lines.forEach(line => {
                const txt = line.trim();
                if (txt) processIncomingSensor(txt);
            });
        }

        // Process sesuai MakeCode kamu + 3 lampu
        function processIncomingSensor(txt) {
            logMsg(`RX < ${txt}`, "#ff9edb");
            if (!state.db || !txt.includes(':')) return;

            const parts = txt.split(':');
            let key = parts[0].trim().toLowerCase();
            const val = parseFloat(parts[1].trim());

            if (isNaN(val)) return;

            let autoType = "sensor";

            // Support 3 lampu + mode otomatis
            if (["status_lampu", "lampu", "lampu2", "lampu3", "mode_otomatis"].includes(key)) {
                autoType = "switch";
                if (key === "status_lampu") key = "lampu";   // supaya tampilan lebih bersih
            }

            if (state.currentData[key]) {
                update(ref(state.db, `${state.currentPath}/${key}`), { value: val });
            } else {
                logMsg(`Auto create ${autoType}: ${key}`, "#ff9edb");
                set(ref(state.db, `${state.currentPath}/${key}`), {
                    tipe: autoType,
                    value: val,
                    satuan: "",
                    batas_atas: 100
                });
            }
        }

        async function sendToMicrobit(key, val) {
            if (!state.rxChar) return logMsg("BLE belum terhubung!", "#ff6b9d");
            try {
                await state.rxChar.writeValue(new TextEncoder().encode(`${key}:${val}\n`));
                logMsg(`TX > ${key}:${val}`, "#ff9edb");
            } catch (e) {
                logMsg(`TX Error: ${e.message}`, "#ff6b9d");
            }
        }

        // Firebase dengan status yang benar
        async function connectFirebase() {
            const apiKey = $('fb-apiKey').value.trim();
            const dbUrl = $('fb-dbUrl').value.trim();
            const path = $('fb-path').value.trim() || "iot/kelas8";

            if (!apiKey || !dbUrl) return alert("Isi API Key dan Database URL!");

            try {
                const config = { apiKey, databaseURL: dbUrl };
                if (getApps().length > 0) await deleteApp(getApps()[0]);
                if (state.unsubscribe) state.unsubscribe();

                const app = initializeApp(config);
                state.db = getDatabase(app);
                state.currentPath = path;

                state.unsubscribe = onValue(ref(state.db, path), (snapshot) => {
                    state.currentData = snapshot.val() || {};
                    renderDashboard(state.currentData);
                    updateDBStatusUI(true);
                });

                localStorage.setItem('smarthome_cfg', JSON.stringify({apiKey, dbUrl, path}));
                logMsg("Firebase terhubung berhasil ✨", "#ff2d95");
                updateDBStatusUI(true);
            } catch (e) {
                logMsg(`Gagal connect Firebase: ${e.message}`, "#ff6b9d");
                updateDBStatusUI(false);
            }
        }

        // Render Dashboard
        function renderDashboard(data) {
            const keys = Object.keys(data);
            $('dashboard-area').style.display = keys.length > 0 ? 'block' : 'none';

            const sensors = keys.filter(k => data[k]?.tipe === 'sensor');
            const switches = keys.filter(k => data[k]?.tipe === 'switch');
            const dimmers = keys.filter(k => data[k]?.tipe === 'dimmer');

            renderSensors(sensors, data);
            renderSwitches(switches, data);
            renderDimmers(dimmers, data);
        }

        function renderSwitches(keys, data) {
            const grid = $('switchGrid');
            Array.from(grid.children).forEach(el => {
                if (!keys.includes(el.id.replace('sw-card-', ''))) el.remove();
            });

            keys.forEach(key => {
                const item = data[key];
                const isOn = (item.value == 1 || item.value === true);
                let card = $(`sw-card-${key}`);

                if (!card) {
                    const html = `
                        <div class="widget-card" id="sw-card-${key}">
                            <h3 class="widget-title">${formatName(key)}</h3>
                            <label class="switch">
                                <input type="checkbox" id="switch-${key}" ${isOn ? 'checked' : ''} 
                                       onchange="window.toggleSwitch('${key}', this.checked)">
                                <span class="slider"></span>
                            </label>
                            <div id="sw-lbl-${key}" style="margin-top:12px;font-weight:700;color:${isOn?'#34c759':'#888'};font-size:1.3em;">
                                ${isOn ? 'ON' : 'OFF'}
                            </div>
                        </div>`;
                    grid.insertAdjacentHTML('beforeend', html);
                } else {
                    const sw = $(`switch-${key}`);
                    if (document.activeElement !== sw) {
                        sw.checked = isOn;
                        const lbl = $(`sw-lbl-${key}`);
                        lbl.innerText = isOn ? 'ON' : 'OFF';
                        lbl.style.color = isOn ? '#34c759' : '#888';
                    }
                }
            });
        }

        // Toggle Switch
        window.toggleSwitch = (key, isChecked) => {
            const newVal = isChecked ? 1 : 0;
            if (state.db) update(ref(state.db, `${state.currentPath}/${key}`), { value: newVal });
            sendToMicrobit(key, newVal);
        };

        // Event Listeners
        $('btn-connect-fb').onclick = connectFirebase;
        $('btn-connect-ble').onclick = connectBLE;
        $('btn-disconnect-ble').onclick = () => { if(state.device) state.device.gatt.disconnect(); };
        $('btnClearLog').onclick = () => $('terminalLog').innerHTML = '';

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('smarthome_cfg') || '{}');
            if (saved.apiKey) {
                $('fb-apiKey').value = saved.apiKey;
                $('fb-dbUrl').value = saved.dbUrl;
                $('fb-path').value = saved.path || "iot/kelas8";
            }
            logMsg("SmartHome siap digunakan 💕", "#ff2d95");
        };
    </script>
</body>
</html>
